      # ── DEUXIÈME PARTIE: CÉLINE ROMANCIER — DE LA VOIX NARRATRICE ────
      - id: 5
        title: "CHAPITRE V – De Bardamu à Céline"
        summary: >
          Godard traccia l'evoluzione della voce narrante come progressiva
          identificazione tra narratore e autore: da Bardamu (nome fittizio) a
          Ferdinand (semi-identificazione), fino all'emergenza del nome Céline
          nei pamphlet e nei quattro ultimi romanzi. Il sistema dei quattro nomi
          (Céline, Destouches, Ferdinand, Louis) e il maquillage dei nomi propri
          reali completano il dispositivo.
        start_id: "8246"
        end_id: "9004"
        arcs:
          - 02_13_voce_identita
        themes:
          - "Voce narrante"
          - "Romanzo e autobiografia"
          - "Confronto Céline-Proust"
        novel_lines: []
        sub_parts:
          - id: "5.1"
            label: "La conquête du je"
            start_id: "8248"
            end_id: "8477"
          - id: "5.2"
            label: "L'émergence du nom de Céline dans les pamphlets"
            start_id: "8478"
            end_id: "8589"
          - id: "5.3"
            label: "L'introduction des divers noms de l'auteur dans le roman"
            start_id: "8590"
            end_id: "9004"

      - id: 6
        title: "CHAPITRE VI – La présence du narrateur"
        summary: >
          Il secondo movimento della voce narrante: la manifestazione crescente
          del presente concreto del narratore nel testo. Dalle prime formule del
          gesto fisico della scrittura all'integrazione della vita quotidiana, il
          prologo celiniano nasce in Mort à crédit. L'urgenza della morte e il
          rapporto invertito tra narrazione e storia dominano gli ultimi romanzi.
        start_id: "9005"
        end_id: "10127"
        arcs:
          - 02_14_voce_presente
        themes:
          - "Voce narrante"
          - "Presente e tempo"
          - "Confronto Céline-Proust"
        novel_lines: []
        sub_parts:
          - id: "6.1"
            label: "À la recherche des formes de la voix narratrice"
            start_id: "9007"
            end_id: "9279"
          - id: "6.2"
            label: "Les références au travail narratif"
            start_id: "9280"
            end_id: "9522"
          - id: "6.3"
            label: "Le présent du narrateur"
            start_id: "9523"
            end_id: "10127"

      - id: 7
        title: "CHAPITRE VII – Les fonctions de la voix"
        summary: >
          Godard analizza le funzioni della voce narrante: mettere in presa
          l'immaginario sul reale (riferimenti a eventi verificabili, materialità
          del libro), stabilire il contatto con il lettore (interpellazioni, mini-
          dialoghi, provocazioni). Gli echi dei pamphlet nei romanzi del dopoguerra
          creano un'ambiguità insanabile.
        start_id: "10128"
        end_id: "10850"
        arcs:
          - 02_15_voce_funzioni
        themes:
          - "Voce narrante"
          - "Écriture e ideologia"
          - "Comico e riso"
        novel_lines: []
        sub_parts:
          - id: "7.1"
            label: "La mise en prise de l'imaginaire sur le réel"
            start_id: "10182"
            end_id: "10314"
          - id: "7.2"
            label: "Le contact avec le lecteur"
            start_id: "10315"
            end_id: "10850"

      # ── TROISIÈME PARTIE: LE ROMAN-AUTOBIOGRAPHIE ─────────────────────
      - id: 8
        title: "CHAPITRE VIII – Le statut du récit"
        summary: >
          Godard rifiuta la nozione di romanzo autobiografico e mostra che gli otto
          racconti di Céline tengono simultaneamente del romanzo, dell'autobiografia
          e della cronaca. La tendenza crescente a concatenare i racconti rende
          l'insieme equivalente alla vita stessa dell'autore.
        start_id: "10931"
        end_id: "11288"
        arcs:
          - 02_16_romanzo_autobiografia
        themes:
          - "Romanzo e autobiografia"
          - "Voce narrante"
        novel_lines: []
        sub_parts: []

      - id: 9
        title: "CHAPITRE IX – La dimension autobiographique"
        summary: >
          Analisi della dimensione autobiografica nell'opera di Céline: la dinamica
          della concatenazione tra i romanzi, il gioco con la cronologia, i riferimenti
          costanti che collegano la seconda serie (romanzi del dopoguerra) alla prima.
          Un certo vantaggio finisce per restare all'autobiografia.
        start_id: "11289"
        end_id: "11858"
        arcs:
          - 02_16_romanzo_autobiografia
        themes:
          - "Romanzo e autobiografia"
          - "Presente e tempo"
        novel_lines: []
        sub_parts: []

      - id: 10
        title: "CHAPITRE X – Le vécu, le fictif, l'imaginaire"
        summary: >
          Godard analizza la sovrapposizione tra dimensione autobiografica e romanzesca:
          la finzione confinata nelle leggende e balletti, la trasposizione dell'esperienza
          tramite nomi propri deformati, la sostituzione e la contro-trasposizione, e la
          relazione circolare tra vita e opera inventata da Céline.
        start_id: "11859"
        end_id: "12510"
        arcs:
          - 02_17_vissuto_immaginario
        themes:
          - "Romanzo e autobiografia"
          - "Presente e tempo"
        novel_lines: []
        sub_parts:
          - id: "10.1"
            label: "La tentation de la fiction"
            start_id: "11890"
            end_id: "11928"
          - id: "10.2"
            label: "Le contact de l'histoire et de l'expérience"
            start_id: "11929"
            end_id: "12130"
          - id: "10.3"
            label: "La substitution. La contre-transposition"
            start_id: "12131"
            end_id: "12249"
          - id: "10.4"
            label: "Une expérience vécue en fonction de l'imaginaire"
            start_id: "12250"
            end_id: "12510"

      - id: 11
        title: "CHAPITRE XI – La crise de la fiction"
        summary: >
          Godard colloca Céline nel contesto della crisi della finzione romanzesca
          del Novecento francese. Confronta la sua formula con quelle di Aragon
          (Le mentir-vrai), Malraux (Antimémoires) e Joyce (dall'autobiografia al
          mito). L'originalità di Céline è la via opposta a Joyce: personalizzazione
          anziché impersonalizzazione, esperienza anziché mito.
        start_id: "12511"
        end_id: "13202"
        arcs:
          - 02_17_vissuto_immaginario
        themes:
          - "Romanzo e autobiografia"
          - "Confronto Céline-Joyce"
          - "Confronto Céline-Proust"
        novel_lines: []
        sub_parts:
          - id: "11.1"
            label: "Les romanciers français des années trente face à la fiction"
            start_id: "12513"
            end_id: "12777"
          - id: "11.2"
            label: "L'imaginaire du côté de l'autobiographie : Aragon, Malraux"
            start_id: "12778"
            end_id: "13045"
          - id: "11.3"
            label: "Joyce et Céline : impersonnalisation et personnalisation"
            start_id: "13046"
            end_id: "13202"

      - id: 12
        title: "CHAPITRE XII – Le présent retrouvé"
        summary: >
          Conclusione del saggio: le corrispondenze tra immaginario e lavoro
          linguistico, la memoria come esperienza del presente (contrapposta al tempo
          ritrovato di Proust), la ricerca del presente nell'écriture come risposta
          all'esperienza del tempo come cammino verso la morte.
        start_id: "13263"
        end_id: "13445"
        arcs:
          - 02_18_immaginario_tempo
        themes:
          - "Presente e tempo"
          - "Stile e linguaggio"
          - "Confronto Céline-Proust"
          - "Confronto Céline-Joyce"
        novel_lines: []
        sub_parts: []

