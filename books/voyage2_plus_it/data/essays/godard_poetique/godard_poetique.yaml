essays:
  godard_poetique:
    author: "Henri Godard"
    work: "Poétique de Céline"
    year: 1985
    publisher: "Gallimard, coll. «Bibliothèque des Idées»"
    language: "fr"
    summary: >
      Monografia critica che analizza sistematicamente la poetica romanzesca di
      Louis-Ferdinand Céline. Godard parte dalla lingua (francese popolare, argot,
      oralità, neologismi) per risalire al plurivocalismo bakhtiniano, all'écriture
      nel senso barthesiano, allo stile come presenza del locutore, alla voce narrante
      e infine al genere (romanzo-autobiografia). La tesi centrale è che il lavoro
      linguistico di Céline — in contraddizione con la sua ideologia reazionaria —
      costituisce un'écriture di libertà, e che la progressiva identificazione tra
      narratore e autore ridefinisce il romanzo come ricerca del presente nell'écriture.
    stance: "stylistic-linguistic"

    arcs:
      - 02_01_primato_stile
      - 02_02_quadro_teorico
      - 02_03_lingua_principi
      - 02_04_oralita_sintassi
