    sections:
      # ── INTRODUCTION ──────────────────────────────────────────────────
      - id: 0
        title: "AVANT-PROPOS"
        summary: >
          Godard presenta l'oggetto e il metodo del saggio: Céline come caso
          privilegiato per lo studio della letteratura; necessità di partire dal
          linguaggio per comprendere la sua poetica romanzesca.
        start_id: "5"
        end_id: "272"
        arcs: []
        themes: []
        sub_parts: []

      # ── PREMIÈRE PARTIE: DE LA LANGUE AU STYLE ────────────────────────
      - id: 1
        title: "CHAPITRE I – Les français de Céline"
        summary: >
          Capitolo monumentale che copre l'intera dimensione linguistica dell'opera
          celiniana: dalla scelta fondamentale del francese popolare all'oralità
          trasposta, dall'argot ai linguaggi settoriali, dai neologismi alle lingue
          straniere e alle onomatopee. Godard mostra che la lingua di Céline è un
          mélange dosato di molteplici registri il cui effetto d'insieme è
          l'impressione di francese popolare orale.
        start_id: "410"
        end_id: "3547"
        arcs:
          - 02_01_primato_stile
          - 02_02_quadro_teorico
          - 02_03_lingua_principi
          - 02_04_oralita_sintassi
          - 02_05_oralita_pronuncia
          - 02_06_francese_popolare
          - 02_07_argot_oscenita
          - 02_08_altri_francesi
        themes:
          - "Stile e linguaggio"
          - "Oralità e parlato"
          - "Francese popolare"
          - "Argot e oscenità"
          - "Punteggiatura e tre punti"
          - "Confronto Céline-Joyce"
          - "Confronto Céline-Proust"
          - "Ritmo e musicalità"
        novel_lines: []
        sub_parts:
          - id: "1.0"
