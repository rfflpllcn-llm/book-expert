      - "Oralità e parlato"
      - "Francese popolare"
      - "Argot e oscenità"
      - "Plurivocalismo"
      - "Écriture e ideologia"
      - "Voce narrante"
      - "Confronto Céline-Proust"
      - "Confronto Céline-Joyce"
      - "Punteggiatura e tre punti"
      - "Romanzo e autobiografia"
