      - id: 2
        title: "CHAPITRE II – Le plurivocalisme célinien"
        summary: >
          Godard applica la teoria bakhtiniana del plurivocalismo a Céline,
          distinguendo il plurivocalismo dei discorsi sociali (la lingua popolare
          come voce contro la norma scritta, la parodia, la rarefazione dei
          guillemets) dal plurivocalismo romanzesco (stile indiretto libero,
          confusione delle istanze narrative, focalizzazione interna).
        start_id: "3548"
        end_id: "5125"
        arcs:
          - 02_09_plurivocalismo_sociale
          - 02_10_plurivocalismo_romanzesco
        themes:
          - "Plurivocalismo"
          - "Francese popolare"
          - "Voce narrante"
          - "Comico e riso"
        novel_lines: []
        sub_parts:
          - id: "2.1"
            label: "Plurivocalisme et roman"
            start_id: "3550"
            end_id: "3618"
          - id: "2.2"
            label: "Le plurivocalisme des discours sociaux chez Céline"
            start_id: "3619"
            end_id: "4665"
          - id: "2.3"
            label: "Le plurivocalisme romanesque"
            start_id: "4666"
            end_id: "5125"

      - id: 3
        title: "CHAPITRE III – Écriture et idéologie"
        summary: >
          Godard affronta la dimensione ideologica delle scelte linguistiche di
          Céline (écriture nel senso barthesiano). Esamina le critiche che vedono
          nella lingua popolare una complicità con l'ideologia e le rovescia:
          l'écriture celiniana lavora contro l'ordine stabilito, in contraddizione
          con le opinioni reazionarie dell'autore.
        start_id: "5347"
        end_id: "6080"
        arcs:
          - 02_11_ecriture_ideologia
        themes:
          - "Écriture e ideologia"
          - "Francese popolare"
          - "Argot e oscenità"
          - "Plurivocalismo"
        novel_lines: []
        sub_parts:
          - id: "3.1"
            label: "Du plurivocalisme à l'écriture"
            start_id: "5349"
            end_id: "5436"
          - id: "3.2"
            label: "L'écriture de Céline vue comme solidaire de son idéologie"
            start_id: "5437"
            end_id: "5556"
          - id: "3.3"
            label: "L'écriture à contre-courant de l'idéologie"
            start_id: "5557"
            end_id: "6080"

      - id: 4
        title: "CHAPITRE IV – Roman et style"
        summary: >
          Godard identifica l'effetto stilistico fondamentale di Céline:
          l'iscrizione permanente della presenza del locutore nel testo. Analizza
          la discontinuità, l'implicazione attiva del lettore, il corrente
          affettivo, la presenza dell'inconscio, la violenza intrinseca alle
          parole, il riso come gai savoir della lingua, e la ricerca della cadenza
          come tratto più inimitabile dello stile celiniano.
        start_id: "6137"
        end_id: "8044"
        arcs:
          - 02_12_stile_presenza
        themes:
          - "Stile e linguaggio"
          - "Oralità e parlato"
          - "Presente e tempo"
          - "Ritmo e musicalità"
          - "Comico e riso"
          - "Confronto Céline-Proust"
        novel_lines: []
        sub_parts:
          - id: "4.1"
            label: "Le style d'un romancier"
            start_id: "6139"
            end_id: "6282"
