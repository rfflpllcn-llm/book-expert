essays:
  godard_poetique:
    author: Henri Godard
    work: Poétique de Céline
    year: 1985
    publisher: Gallimard, coll. «Bibliothèque des Idées»
    language: fr
    summary: 'Monografia critica che analizza sistematicamente la poetica romanzesca di Louis-Ferdinand Céline. Godard parte
      dalla lingua (francese popolare, argot, oralità, neologismi) per risalire al plurivocalismo bakhtiniano, all''écriture
      nel senso barthesiano, allo stile come presenza del locutore, alla voce narrante e infine al genere (romanzo-autobiografia).
      La tesi centrale è che il lavoro linguistico di Céline — in contraddizione con la sua ideologia reazionaria — costituisce
      un''écriture di libertà, e che la progressiva identificazione tra narratore e autore ridefinisce il romanzo come ricerca
      del presente nell''écriture.

      '
    stance: stylistic-linguistic
    arcs:
    - 02_01_primato_stile
    - 02_02_quadro_teorico
    - 02_03_lingua_principi
    - 02_04_oralita_sintassi
    - 02_05_oralita_pronuncia
    - 02_06_francese_popolare
    - 02_07_argot_oscenita
    - 02_08_altri_francesi
    - 02_09_plurivocalismo_sociale
    - 02_10_plurivocalismo_romanzesco
    - 02_11_ecriture_ideologia
    - 02_12_stile_presenza
    - 02_13_voce_identita
    - 02_14_voce_presente
    - 02_15_voce_funzioni
    - 02_16_romanzo_autobiografia
    - 02_17_vissuto_immaginario
    - 02_18_immaginario_tempo
    - 02_19_bibliografia_indici
    themes:
    - Stile e linguaggio
    - Oralità e parlato
    - Francese popolare
    - Argot e oscenità
    - Plurivocalismo
    - Écriture e ideologia
    - Voce narrante
    - Confronto Céline-Proust
    - Confronto Céline-Joyce
    - Punteggiatura e tre punti
    - Romanzo e autobiografia
    - Presente e tempo
    - Ritmo e musicalità
    - Comico e riso
    characters:
    - Céline
    - Bardamu
    - Ferdinand
    - Destouches
    - Proust
    - Joyce
    - Bakhtine
    - Barthes
    - Queneau
    - Aragon
    - Malraux
    - Flaubert
    - Kristeva
    - Richard
    - Spitzer
    - Delphine
    - Lili
    sections:
    - id: 0
      title: AVANT-PROPOS
      summary: 'Godard presenta l''oggetto e il metodo del saggio: Céline come caso privilegiato per lo studio della letteratura;
        necessità di partire dal linguaggio per comprendere la sua poetica romanzesca.

        '
      start_id: '5'
      end_id: '272'
      arcs: []
      themes: []
      sub_parts: []
    - id: 1
      title: CHAPITRE I – Les français de Céline
      summary: 'Capitolo monumentale che copre l''intera dimensione linguistica dell''opera celiniana: dalla scelta fondamentale
        del francese popolare all''oralità trasposta, dall''argot ai linguaggi settoriali, dai neologismi alle lingue straniere
        e alle onomatopee. Godard mostra che la lingua di Céline è un mélange dosato di molteplici registri il cui effetto
        d''insieme è l''impressione di francese popolare orale.

        '
      start_id: '410'
      end_id: '3547'
      arcs:
      - 02_01_primato_stile
      - 02_02_quadro_teorico
      - 02_03_lingua_principi
      - 02_04_oralita_sintassi
      - 02_05_oralita_pronuncia
      - 02_06_francese_popolare
      - 02_07_argot_oscenita
      - 02_08_altri_francesi
      themes:
      - Stile e linguaggio
      - Oralità e parlato
      - Francese popolare
      - Argot e oscenità
      - Punteggiatura e tre punti
      - Confronto Céline-Joyce
      - Confronto Céline-Proust
      - Ritmo e musicalità
      novel_lines: []
      sub_parts:
      - id: '1.0'
        label: 'Introduzione: il primato dello stile e il quadro teorico (Barthes, Bakhtine)'
        start_id: '275'
        end_id: '543'
      - id: '1.1'
        label: Les choix qu'un écrivain fait dans la langue
        start_id: '544'
        end_id: '695'
      - id: '1.2'
        label: La forme orale de la langue
        start_id: '696'
        end_id: '1244'
      - id: '1.3'
        label: Le français populaire et argotique
        start_id: '1245'
        end_id: '2201'
      - id: '1.4'
        label: Les autres français
        start_id: '2202'
        end_id: '2666'
      - id: '1.5'
        label: À la limite du français
        start_id: '2667'
        end_id: '3024'
      - id: '1.6'
        label: Au-delà du français
        start_id: '3025'
        end_id: '3161'
      - id: '1.7'
        label: Au-delà du langage
        start_id: '3162'
        end_id: '3547'
    - id: 2
      title: CHAPITRE II – Le plurivocalisme célinien
      summary: 'Godard applica la teoria bakhtiniana del plurivocalismo a Céline, distinguendo il plurivocalismo dei discorsi
        sociali (la lingua popolare come voce contro la norma scritta, la parodia, la rarefazione dei guillemets) dal plurivocalismo
        romanzesco (stile indiretto libero, confusione delle istanze narrative, focalizzazione interna).

        '
      start_id: '3548'
      end_id: '5125'
      arcs:
      - 02_09_plurivocalismo_sociale
      - 02_10_plurivocalismo_romanzesco
      themes:
      - Plurivocalismo
      - Francese popolare
      - Voce narrante
      - Comico e riso
      novel_lines: []
      sub_parts:
      - id: '2.1'
        label: Plurivocalisme et roman
        start_id: '3550'
        end_id: '3618'
      - id: '2.2'
        label: Le plurivocalisme des discours sociaux chez Céline
        start_id: '3619'
        end_id: '4665'
      - id: '2.3'
        label: Le plurivocalisme romanesque
        start_id: '4666'
        end_id: '5125'
    - id: 3
      title: CHAPITRE III – Écriture et idéologie
      summary: 'Godard affronta la dimensione ideologica delle scelte linguistiche di Céline (écriture nel senso barthesiano).
        Esamina le critiche che vedono nella lingua popolare una complicità con l''ideologia e le rovescia: l''écriture celiniana
        lavora contro l''ordine stabilito, in contraddizione con le opinioni reazionarie dell''autore.

        '
      start_id: '5347'
      end_id: '6080'
      arcs:
      - 02_11_ecriture_ideologia
      themes:
      - Écriture e ideologia
      - Francese popolare
      - Argot e oscenità
      - Plurivocalismo
      novel_lines: []
      sub_parts:
      - id: '3.1'
        label: Du plurivocalisme à l'écriture
        start_id: '5349'
        end_id: '5436'
      - id: '3.2'
        label: L'écriture de Céline vue comme solidaire de son idéologie
        start_id: '5437'
        end_id: '5556'
      - id: '3.3'
        label: L'écriture à contre-courant de l'idéologie
        start_id: '5557'
        end_id: '6080'
    - id: 4
      title: CHAPITRE IV – Roman et style
      summary: 'Godard identifica l''effetto stilistico fondamentale di Céline: l''iscrizione permanente della presenza del
        locutore nel testo. Analizza la discontinuità, l''implicazione attiva del lettore, il corrente affettivo, la presenza
        dell''inconscio, la violenza intrinseca alle parole, il riso come gai savoir della lingua, e la ricerca della cadenza
        come tratto più inimitabile dello stile celiniano.

        '
      start_id: '6137'
      end_id: '8044'
      arcs:
      - 02_12_stile_presenza
      themes:
      - Stile e linguaggio
      - Oralità e parlato
      - Presente e tempo
      - Ritmo e musicalità
      - Comico e riso
      - Confronto Céline-Proust
      novel_lines: []
      sub_parts:
      - id: '4.1'
        label: Le style d'un romancier
        start_id: '6139'
        end_id: '6282'
      - id: '4.2'
        label: La présence du locuteur dans son discours
        start_id: '6283'
        end_id: '6660'
      - id: '4.3'
        label: L'implication corrélative du lecteur
        start_id: '6661'
        end_id: '6711'
      - id: '4.4'
        label: Un courant d'affectivité
        start_id: '6712'
        end_id: '7174'
      - id: '4.5'
        label: Une présence de l'inconscient
        start_id: '7175'
        end_id: '7444'
      - id: '4.6'
        label: La violence faite au lecteur
        start_id: '7445'
        end_id: '7533'
      - id: '4.7'
        label: Le gai savoir de la langue
        start_id: '7534'
        end_id: '7818'
      - id: '4.8'
        label: La poursuite de la cadence
        start_id: '7819'
        end_id: '8044'
    - id: 5
      title: CHAPITRE V – De Bardamu à Céline
      summary: 'Godard traccia l''evoluzione della voce narrante come progressiva identificazione tra narratore e autore:
        da Bardamu (nome fittizio) a Ferdinand (semi-identificazione), fino all''emergenza del nome Céline nei pamphlet e
        nei quattro ultimi romanzi. Il sistema dei quattro nomi (Céline, Destouches, Ferdinand, Louis) e il maquillage dei
        nomi propri reali completano il dispositivo.

        '
      start_id: '8246'
      end_id: '9004'
      arcs:
      - 02_13_voce_identita
      themes:
      - Voce narrante
      - Romanzo e autobiografia
      - Confronto Céline-Proust
      novel_lines: []
      sub_parts:
      - id: '5.1'
        label: La conquête du je
        start_id: '8248'
        end_id: '8477'
      - id: '5.2'
        label: L'émergence du nom de Céline dans les pamphlets
        start_id: '8478'
        end_id: '8589'
      - id: '5.3'
        label: L'introduction des divers noms de l'auteur dans le roman
        start_id: '8590'
        end_id: '9004'
    - id: 6
      title: CHAPITRE VI – La présence du narrateur
      summary: 'Il secondo movimento della voce narrante: la manifestazione crescente del presente concreto del narratore
        nel testo. Dalle prime formule del gesto fisico della scrittura all''integrazione della vita quotidiana, il prologo
        celiniano nasce in Mort à crédit. L''urgenza della morte e il rapporto invertito tra narrazione e storia dominano
        gli ultimi romanzi.

        '
      start_id: '9005'
      end_id: '10127'
      arcs:
      - 02_14_voce_presente
      themes:
      - Voce narrante
      - Presente e tempo
      - Confronto Céline-Proust
      novel_lines: []
      sub_parts:
      - id: '6.1'
        label: À la recherche des formes de la voix narratrice
        start_id: '9007'
        end_id: '9279'
      - id: '6.2'
        label: Les références au travail narratif
        start_id: '9280'
        end_id: '9522'
      - id: '6.3'
        label: Le présent du narrateur
        start_id: '9523'
        end_id: '10127'
    - id: 7
      title: CHAPITRE VII – Les fonctions de la voix
      summary: 'Godard analizza le funzioni della voce narrante: mettere in presa l''immaginario sul reale (riferimenti a
        eventi verificabili, materialità del libro), stabilire il contatto con il lettore (interpellazioni, mini- dialoghi,
        provocazioni). Gli echi dei pamphlet nei romanzi del dopoguerra creano un''ambiguità insanabile.

        '
      start_id: '10128'
      end_id: '10850'
      arcs:
      - 02_15_voce_funzioni
      themes:
      - Voce narrante
      - Écriture e ideologia
      - Comico e riso
      novel_lines: []
      sub_parts:
      - id: '7.1'
        label: La mise en prise de l'imaginaire sur le réel
        start_id: '10182'
        end_id: '10314'
      - id: '7.2'
        label: Le contact avec le lecteur
        start_id: '10315'
        end_id: '10850'
    - id: 8
      title: CHAPITRE VIII – Le statut du récit
      summary: 'Godard rifiuta la nozione di romanzo autobiografico e mostra che gli otto racconti di Céline tengono simultaneamente
        del romanzo, dell''autobiografia e della cronaca. La tendenza crescente a concatenare i racconti rende l''insieme
        equivalente alla vita stessa dell''autore.

        '
      start_id: '10931'
      end_id: '11288'
      arcs:
      - 02_16_romanzo_autobiografia
      themes:
      - Romanzo e autobiografia
      - Voce narrante
      novel_lines: []
      sub_parts: []
    - id: 9
      title: CHAPITRE IX – La dimension autobiographique
      summary: 'Analisi della dimensione autobiografica nell''opera di Céline: la dinamica della concatenazione tra i romanzi,
        il gioco con la cronologia, i riferimenti costanti che collegano la seconda serie (romanzi del dopoguerra) alla prima.
        Un certo vantaggio finisce per restare all''autobiografia.

        '
      start_id: '11289'
      end_id: '11858'
      arcs:
      - 02_16_romanzo_autobiografia
      themes:
      - Romanzo e autobiografia
      - Presente e tempo
      novel_lines: []
      sub_parts: []
    - id: 10
      title: CHAPITRE X – Le vécu, le fictif, l'imaginaire
      summary: 'Godard analizza la sovrapposizione tra dimensione autobiografica e romanzesca: la finzione confinata nelle
        leggende e balletti, la trasposizione dell''esperienza tramite nomi propri deformati, la sostituzione e la contro-trasposizione,
        e la relazione circolare tra vita e opera inventata da Céline.

        '
      start_id: '11859'
      end_id: '12510'
      arcs:
      - 02_17_vissuto_immaginario
      themes:
      - Romanzo e autobiografia
      - Presente e tempo
      novel_lines: []
      sub_parts:
      - id: '10.1'
        label: La tentation de la fiction
        start_id: '11890'
        end_id: '11928'
      - id: '10.2'
        label: Le contact de l'histoire et de l'expérience
        start_id: '11929'
        end_id: '12130'
      - id: '10.3'
        label: La substitution. La contre-transposition
        start_id: '12131'
        end_id: '12249'
      - id: '10.4'
        label: Une expérience vécue en fonction de l'imaginaire
        start_id: '12250'
        end_id: '12510'
    - id: 11
      title: CHAPITRE XI – La crise de la fiction
      summary: 'Godard colloca Céline nel contesto della crisi della finzione romanzesca del Novecento francese. Confronta
        la sua formula con quelle di Aragon (Le mentir-vrai), Malraux (Antimémoires) e Joyce (dall''autobiografia al mito).
        L''originalità di Céline è la via opposta a Joyce: personalizzazione anziché impersonalizzazione, esperienza anziché
        mito.

        '
      start_id: '12511'
      end_id: '13202'
      arcs:
      - 02_17_vissuto_immaginario
      themes:
      - Romanzo e autobiografia
      - Confronto Céline-Joyce
      - Confronto Céline-Proust
      novel_lines: []
      sub_parts:
      - id: '11.1'
        label: Les romanciers français des années trente face à la fiction
        start_id: '12513'
        end_id: '12777'
      - id: '11.2'
        label: 'L''imaginaire du côté de l''autobiographie : Aragon, Malraux'
        start_id: '12778'
        end_id: '13045'
      - id: '11.3'
        label: 'Joyce et Céline : impersonnalisation et personnalisation'
        start_id: '13046'
        end_id: '13202'
    - id: 12
      title: CHAPITRE XII – Le présent retrouvé
      summary: 'Conclusione del saggio: le corrispondenze tra immaginario e lavoro linguistico, la memoria come esperienza
        del presente (contrapposta al tempo ritrovato di Proust), la ricerca del presente nell''écriture come risposta all''esperienza
        del tempo come cammino verso la morte.

        '
      start_id: '13263'
      end_id: '13445'
      arcs:
      - 02_18_immaginario_tempo
      themes:
      - Presente e tempo
      - Stile e linguaggio
      - Confronto Céline-Proust
      - Confronto Céline-Joyce
      novel_lines: []
      sub_parts: []
    - id: 13
      title: RÉFÉRENCES BIBLIOGRAPHIQUES ET INDEX
      summary: 'Apparato bibliografico completo: edizioni di riferimento delle opere di Céline, studi consacrati a Céline,
        studi generali e opere teoriche, indice delle opere di Céline, indice dei nomi di persona.

        '
      start_id: '13446'
      end_id: '14203'
