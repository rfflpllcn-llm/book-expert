  journeys_to_the_extremes:
    author: Damian Catani
    work: 'Louis-Ferdinand Céline: Journeys to the Extreme'
    year: 2021
    publisher: Routledge
    language: en
    summary: 'Biografia critica che percorre l''intera vita e opera di Céline attraverso i suoi ''viaggi estremi'':
      dall''infanzia piccolo-borghese alla Grande Guerra, dall''Africa coloniale alla medicina, dalla consacrazione
      letteraria del Voyage ai pamphlet antisemiti, dall''Occupazione all''esilio danese, fino alla trilogia tedesca
      e alla morte a Meudon. Catani intreccia biografia, analisi testuale e ricezione critica, affrontando
      esplicitamente il problema etico-estetico della separazione tra opera e autore nell''era della cancel culture.

      '
    stance: biographical-critical
    arcs:
